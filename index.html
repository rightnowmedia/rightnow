  <title>RightNow Media</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #231f20;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #eee;
    }

    header svg {
      width: 40px;
      height: auto;
    }

    header span {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }

    .hero-logo {
      width: 80px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .cta {
      display: inline-block;
      background: #231f20;
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .cta:hover {
      opacity: 0.8;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #999;
      border-top: 1px solid #eee;
    }
  </style>
